name: Deploy Next.js App

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/blog-front:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/blog-front:latest

      - name: SSH into server and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            docker stop blog-front || true
            docker rm blog-front || true
            docker rmi ${{ secrets.DOCKER_USERNAME }}/blog-front:latest || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/blog-front:latest
            docker run -d --name blog-front -p 12345:3000 ${{ secrets.DOCKER_USERNAME }}/blog-front:latest
